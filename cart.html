<!-- Header -->
<header>
    <div class="container header-container">
        <div class="logo">
            <a href="{{ url_for('index') }}">MediHome Logo</a>
        </div>
        <nav class="navigation" id="navLinks">
            <ul>
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('medicines') }}">Medicine</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
                <li><a href="{{ url_for('services') }}">Services</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <!-- Theme Toggle -->
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>

            <!-- User Dropdown (optional) -->
            <div class="user-dropdown">
                <img src="{{ user.image or 'https://picsum.photos/seed/user123/40/40.jpg' }}" alt="User Profile"
                     class="user-profile" id="userProfile">
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="{{ url_for('dashboard') }}">Profile</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Toggle -->
        <div class="mobile-menu-toggle" id="mobileMenuToggle">
            <i class="fas fa-bars"></i>
        </div>
    </div>
</header>

<!-- Include cart.js -->
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
